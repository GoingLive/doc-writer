# doc-writer layout profile draft
# source: LOI.docx
# purpose: first machine-readable layout/profile extraction from Word source
# note: Word is used only as import/design source. Runtime uses YAML/CSS/assets.

profile:
  tenant_id: siqueira
  template_type: standard_letter_A4
  profile_id: siqueira_standard_letter_A4
  source_docx: LOI.docx
  extraction_status: first_draft
  generated_on: 2026-04-24
  runtime_target:
    preview: html
    final: pdf
    pdf_engine: wkhtmltopdf

page:
  size: A4
  units: mm
  width: 210.01
  height: 297.00
  margins:
    top: 25.01
    right: 25.01
    bottom: 25.01
    left: 30.00
  header_distance: 12.51
  footer_distance: 9.00
  first_page_has_different_header_footer: true
  sections_detected: 1

source_headers:
  default_header:
    file: word/header1.xml
    detected_images:
      - asset_id: logo_small
        source_media: word/media/image2.png
        relationship_id: rId1
        rendered_size:
          width: 43.12
          height: 9.52
        notes: "Header image detected in default/following-page header."
  first_page_header:
    file: word/header2.xml
    detected_images:
      - asset_id: logo_small
        source_media: word/media/image2.png
        relationship_id: rId1
        rendered_size:
          width: 43.12
          height: 9.52
        notes: "Same image detected in first-page header."

source_footers:
  default_footer:
    file: word/footer1.xml
    detected_text:
      - "2/1"
    notes: "Appears to contain a page counter or manually shown page-number text. Needs replacement with generated page counter."
  first_page_footer:
    file: word/footer2.xml
    detected_text:
      - "Siqueira International AG – Baarerstrasse 71 – CH-6300 Zug/ZG – Switzerland"
      - "Phone +41 79 901 82 58 – Email: info@siqueirainternational.com – UID: CHE-473.221.639"
    notes: "Footer contains public sender/company data."

assets:
  logo_small:
    source_media: word/media/image2.png
    format: png
    pixel_size:
      width: 498
      height: 110
    rendered_size:
      width: 43.12
      height: 9.52
    intended_runtime_file: assets/logo_small.png
    public_ok: true
    usage:
      - first_page_header
      - following_page_header

  logo_svg_candidate:
    source_media: word/media/image3.svg
    format: svg
    pixel_size: null
    rendered_size: null
    intended_runtime_file: assets/logo.svg
    public_ok: true
    usage:
      - not_confirmed
    notes: "SVG exists in DOCX media folder but was not detected as the actually rendered header image in the parsed drawing."

  signature_roland:
    source_media: word/media/image1.png
    format: png
    pixel_size:
      width: 313
      height: 126
    rendered_size:
      width: 48.68
      height: 19.60
    intended_runtime_file: assets/signature_roland.png
    public_ok: false
    usage:
      - signer_signature
    notes: "Signature image should normally be stored privately or only in protected tenant assets."

document_roles_detected:
  recipient_address:
    source: body
    detected_text:
      - "Oman Sugar Refinery Company LLC (OSRC)"
      - "attn. Mr. Zayid Al Habsi"
      - "P.O.Box 1138"
      - "P.C. 130 AI Ufug Building"
      - "Shatti Al Qurum"
      - "Muscat, Sultanate of Oman"
    runtime_tag: adr
    css_class: dw-recipient-address
    word_style_target: dw.recipient_address
    layout_behavior:
      positioning: fixed_zone
      affects_location_date: false
      max_expected_lines: 8

  location_date:
    source: body
    detected_text: "Zug, Switzerland,  7. April 2025"
    runtime_tag: date
    css_class: dw-location-date
    word_style_target: dw.location_date
    layout_behavior:
      positioning: fixed_zone
      independent_from_recipient_address: true

  title:
    source: body
    detected_text: "REQUEST FOR OFFER (RFO) – REFINED SUGAR (ICUMSA 45)"
    runtime_tag: subj
    css_class: dw-subject
    word_style_target: dw.title

  subtitle:
    source: not_detected
    runtime_tag: sub
    css_class: dw-subtitle
    word_style_target: dw.subtitle

  salutation:
    source: body
    detected_text: "Dear Mr. Zayid Al Habsi"
    runtime_tag: sal
    css_class: dw-salutation
    word_style_target: dw.salutation

  body:
    source: body
    runtime_tag: body
    css_class: dw-body
    word_style_target: dw.body
    detected_section_headings:
      - "Product:"
      - "Quantity:"
      - "Delivery Terms:"
      - "Destination:"
      - "Shipment:"
      - "Price:"
      - "Payment Terms:"
      - "Inspection:"
      - "Documentation:"
      - "Additional Information Requested:"

  closing_salutation:
    source: body
    detected_text: "Sincerely yours"
    runtime_tag: close
    css_class: dw-closing-salutation
    word_style_target: dw.closing_salutation

  signer_block:
    source: body
    detected_signer:
      name: "Roland Hüttmann"
      title: "CEO and Member of the Board of Directors"
      signature_asset: signature_roland
    runtime_tag: signers
    css_class: dw-signer-block
    word_style_target: dw.sender_signature
    layout_behavior:
      default_layout: one_column
      allow_multiple_signers: true
      signature_image_flow: normal
      signature_image_overlay: false

  references:
    source: not_detected
    runtime_tag: attach
    css_class: dw-references-attachments
    word_style_target: dw.references

runtime_tags:
  adr: recipient_address
  date: location_date
  subj: title
  sub: subtitle
  sal: salutation
  body: body
  close: closing_salutation
  signers: signer_block
  attach: references
  pb: page_break
  keep: keep_together

layout_blocks:
  # Coordinates below are a first draft for the runtime layout model.
  # Values should be adjusted visually against the Word template and generated PDF.
  first_page:
    logo_small:
      type: image
      asset: logo_small
      page_scope: first
      x: 30
      y: 12.5
      width: 43.12
      height: 9.52

    recipient_address:
      type: content_block
      role: recipient_address
      page_scope: first
      x: 30
      y: 45
      width: 85
      height: 40
      overflow: allow_down
      notes: "Address may be 6-8 lines. The date block must remain fixed."

    location_date:
      type: content_block
      role: location_date
      page_scope: first
      x: 110
      y: 88
      width: 75
      height: 8
      fixed_position: true

    body_area:
      type: flow_area
      role: body_flow
      page_scope: first
      x: 30
      y: 102
      width: 155
      height: 160
      notes: "Begins after fixed recipient/date/title/salutation area."

  following_pages:
    logo_small:
      type: image
      asset: logo_small
      page_scope: following
      x: 30
      y: 12.5
      width: 43.12
      height: 9.52

    body_area:
      type: flow_area
      role: body_flow
      page_scope: following
      x: 30
      y: 32
      width: 155
      height: 230

  all_pages:
    footer_company:
      type: text_block
      source: tenant.company_footer
      page_scope: all
      x: 30
      y: 272
      width: 140
      height: 12
      css_class: dw-footer-company

    page_counter:
      type: page_counter
      page_scope: all
      x: 170
      y: 274
      width: 25
      height: 8
      format: "{page}/{pages}"
      css_class: dw-page-counter

styles_detected_from_word:
  normal:
    word_style_name: Normal
    font_family_detected: Calibri
    font_size_pt: 12
    spacing_before_twips: 140
    spacing_after_twips: 140

  heading_1:
    word_style_name: heading 1
    font_family_detected: Arial
    font_size_pt: 14
    bold: true
    spacing_before_twips: 200
    spacing_after_twips: 200

  heading_2:
    word_style_name: heading 2
    font_family_detected: Arial
    font_size_pt: 11
    bold: true
    spacing_before_twips: 240
    spacing_after_twips: 60

  heading_3:
    word_style_name: heading 3
    font_size_pt: 13
    bold: true
    spacing_before_twips: 240
    spacing_after_twips: 60

  header:
    word_style_name: header
    font_size_pt: 9
    italic: true

  footer:
    word_style_name: footer
    font_size_pt: 9
    alignment: center
    spacing_before_twips: 0
    spacing_after_twips: 0

body_style_targets:
  h1:
    markdown: "#"
    css_class: dw-h1
    word_style_target: dw.h1

  h2:
    markdown: "##"
    css_class: dw-h2
    word_style_target: dw.h2

  h3:
    markdown: "###"
    css_class: dw-h3
    word_style_target: dw.h3

  h4:
    markdown: "####"
    css_class: dw-h4
    word_style_target: dw.h4

  paragraph:
    markdown: plain_text
    css_class: dw-body-p
    word_style_target: dw.body

  bullet_list:
    markdown: "-"
    css_class: dw-bullet-list
    word_style_target: dw.body_bullet

  numbered_list:
    markdown: "1."
    css_class: dw-numbered-list
    word_style_target: dw.body_numbered

  table:
    markdown: pipe_table
    css_class: dw-table
    word_style_target: dw.table

  code_block:
    markdown: "```"
    css_class: dw-code
    word_style_target: dw.code
    font_family: "Consolas, Courier New, monospace"

  quote:
    markdown: ">"
    css_class: dw-quote
    word_style_target: dw.quote

page_break_rules:
  automatic:
    avoid_heading_orphan: true
    avoid_subject_split: true
    avoid_signer_block_split: true
    avoid_table_row_split: true
  manual:
    short_tag: pb
    html_class: dw-page-break
    css_rule: "page-break-before: always"
  keep_together:
    short_tag: keep
    html_class: dw-keep
    css_rule: "page-break-inside: avoid"

signer_model:
  default_layout: one_column
  allowed_layouts:
    - one_column
    - two_columns
    - stacked
  signers:
    - signer_id: roland_huettmann
      name: "Roland Hüttmann"
      title: "CEO and Member of the Board of Directors"
      signature_asset: signature_roland
  notes:
    - "Signer data should come from document job or tenant signatory registry."
    - "Signature images should be inserted in normal flow, never as overlay."

import_notes:
  - "This YAML is a first draft extracted from LOI.docx."
  - "Exact x/y values for content flow are not fully recoverable from normal Word paragraphs and should be adjusted visually."
  - "Word remains only an import/design source. Runtime should use YAML/CSS/assets."
  - "Footer page counter text in source appears as '2/1' and should be replaced with generated page counter."
  - "The recipient address and location/date must be separate fixed blocks."
